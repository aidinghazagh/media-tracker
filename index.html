<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; media-src 'self' file: blob: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' file: blob: https:;">
  <title>Media Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div class="header-left">
        <button id="btn-sidebar-toggle" class="sidebar-toggle" title="Menu">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="app-logo" id="app-logo"></span>
        <span class="app-title">Media Tracker</span>
      </div>
    </header>
    <div id="sidebar-overlay"></div>

    <div id="app-body">
      <aside id="sidebar">
        <div class="sidebar-header">
          <h2>Projects</h2>
          <button id="btn-add-project" title="Add Project">+</button>
        </div>
        <div id="project-list"></div>
        <div class="sidebar-footer">
          <button id="btn-rescan" title="Rescan Current Project"></button>
        </div>
      </aside>

      <main id="content">
        <div id="welcome-screen">
          <div class="welcome-icon" id="welcome-icon"></div>
          <h1>Welcome to Media Tracker</h1>
          <p>Track your video and audio progress across projects</p>
          <button id="btn-start">Create New Project</button>
        </div>

        <div id="project-view" style="display:none">
          <div id="player-section">
            <div id="player-container">
              <video id="media-player"></video>
              <div id="subtitle-display"></div>
              <div id="pip-overlay">
                <button id="pip-play" title="Play/Pause"></button>
                <button id="pip-fullscreen" title="Fullscreen"></button>
              </div>
              <div id="player-controls">
                <button id="btn-rewind" title="Rewind 10s"></button>
                <button id="btn-play" title="Play/Pause (Space)"></button>
                <button id="btn-skip" title="Skip 10s"></button>
                <div id="progress-bar">
                  <div id="progress-buffered"></div>
                  <div id="progress-played"></div>
                  <input type="range" id="seek-bar" min="0" max="1000" value="0">
                </div>
                <span id="time-display">0:00 / 0:00</span>
                <div id="subtitle-control">
                  <button id="btn-subtitle" title="Subtitles (C)"></button>
                  <div id="subtitle-menu" style="display:none">
                    <div id="subtitle-options"></div>
                    <div class="menu-divider"></div>
                    <button id="btn-load-subtitle">Load Subtitle File...</button>
                    <div class="menu-divider"></div>
                    <div class="menu-header">Subtitle Settings</div>
                    <div class="sub-setting">
                      <label>Size</label>
                      <div class="sub-setting-row">
                        <button class="sub-size-btn sub-size-s" data-size="small">S</button>
                        <button class="sub-size-btn sub-size-m active" data-size="medium">M</button>
                        <button class="sub-size-btn sub-size-l" data-size="large">L</button>
                      </div>
                    </div>
                    <div class="sub-setting">
                      <label>Text Color</label>
                      <input type="color" id="sub-text-color" value="#ffffff">
                    </div>
                    <div class="sub-setting">
                      <label>Background</label>
                      <input type="color" id="sub-bg-color" value="#000000">
                    </div>
                    <div class="sub-setting">
                      <label>BG Opacity</label>
                      <input type="range" id="sub-bg-opacity" min="0" max="100" value="80">
                    </div>
                  </div>
                </div>
                <div id="speed-control">
                  <button id="speed-label" title="Playback Speed">1x</button>
                  <div id="speed-popup" style="display:none">
                    <button class="speed-btn" data-speed="0.5">0.5x</button>
                    <button class="speed-btn" data-speed="1">1x</button>
                    <button class="speed-btn" data-speed="1.5">1.5x</button>
                    <button class="speed-btn" data-speed="1.75">1.75x</button>
                    <button class="speed-btn" data-speed="2">2x</button>
                    <button class="speed-btn" data-speed="3">3x</button>
                  </div>
                </div>
                <div id="volume-control">
                  <button id="btn-volume" title="Volume"></button>
                  <input type="range" id="volume-bar" min="0" max="100" value="100">
                </div>
                <button id="btn-fullscreen" title="Fullscreen (F)"></button>
              </div>
            </div>
            <div id="now-playing">
              <span id="current-file-name">No file selected</span>
            </div>
          </div>

          <div id="dashboard">
            <div class="stat-card">
              <div class="stat-value" id="stat-total">0h</div>
              <div class="stat-label">Total Duration</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-watched">0h</div>
              <div class="stat-label">Watched</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-remaining">0h</div>
              <div class="stat-label">Remaining</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="stat-progress">0%</div>
              <div class="stat-label">Progress</div>
              <div class="stat-bar">
                <div class="stat-bar-fill" id="stat-progress-bar"></div>
              </div>
            </div>
          </div>

          <div id="file-list-header">
            <h3>Files</h3>
            <div class="file-list-controls">
              <button class="action-btn" id="btn-link-folder" title="Link Folder">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                Link Folder
              </button>
              <button class="action-btn" id="btn-add-files" title="Add Files">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add Files
              </button>
              <button class="action-btn" id="btn-add-link" title="Add Link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                Add Link
              </button>
              <div class="sort-group">
                <select id="sort-select">
                  <option value="name">Sort by Name</option>
                  <option value="manual">Manual Order</option>
                  <option value="progress">Sort by Progress</option>
                  <option value="lastWatched">Sort by Last Watched</option>
                  <option value="dateAdded">Sort by Date Added</option>
                </select>
                <button id="sort-direction" title="Toggle sort direction"></button>
              </div>
              <input type="text" id="search-input" placeholder="Search files...">
              <label class="hide-watched-label">
                <input type="checkbox" id="hide-watched"> Hide watched
              </label>
            </div>
          </div>
          <div id="file-list"></div>
          <div id="empty-project" style="display:none">
            <div class="empty-project-content">
              <p>No files yet</p>
              <p>Link a folder, add files, add a video link, or drag &amp; drop media here</p>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="project-context-menu" class="context-menu" style="display:none">
    <button id="ctx-open-project"></button>
    <button id="ctx-open-folder"></button>
    <button id="ctx-rename-project"></button>
    <button id="ctx-delete-project" class="danger"></button>
  </div>

  <div id="file-context-menu" class="context-menu" style="display:none">
    <button id="ctx-play-file"></button>
    <button id="ctx-rename-file"></button>
    <button id="ctx-remove-file" class="danger"></button>
  </div>

  <script src="app.js"></script>
</body>
</html>
